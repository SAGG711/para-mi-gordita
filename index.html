<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para mi gordita 💛</title>

  <!-- Fuente bonita -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Quicksand', sans-serif;
      background-color: #FFD84D;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(10px);
      position: relative;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2em;
      margin-bottom: 10px;
    }

    img {
      width: 70%;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 15px;
      background: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #fff3b0;
    }

    /* Pantalla secundaria */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .screen h2 {
      font-family: 'Pacifico', cursive;
    }

    /* Marco tipo girasol (simple decorativo) */
    body::before {
      content: "🌻 🌻 🌻 🌻 🌻 🌻 🌻 🌻 🌻 🌻";
      position: absolute;
      top: 0;
      width: 100%;
      text-align: center;
      font-size: 20px;
    }

    body::after {
      content: "🌻 🌻 🌻 🌻 🌻 🌻 🌻 🌻 🌻 🌻";
      position: absolute;
      bottom: 0;
      width: 100%;
      text-align: center;
      font-size: 20px;
    }

  </style>
</head>
<body>

  <!-- Pantalla principal -->
  <div class="container" id="main">
    <h1>Hola mi gordita 💛</h1>
    <img src="Yo.jpeg" alt="Yo">

    <div class="buttons">
      <button onclick="mostrar(1)">Toca acá</button>
      <button onclick="mostrar(2)">No mejor acá</button>
      <button onclick="mostrar(3)">Oprímeme y verás</button>
      <button onclick="mostrar(4)">O mejor aca?</button>
      <button onclick="mostrar(5)">Este también 👀</button>
      <button onclick="mostrar(6)">Y si tocas este</button>
    </div>
  </div>

  <!-- Pantallas ocultas -->
  <div class="container screen" id="pantalla1">
    <h2>Mi dormilona favorita 💛</h2>
    <!-- CAMBIA ESTA IMAGEN -->
    <img src="Mimida.jpeg">
    <button onclick="volver()">Volver</button>
  </div>

  <div class="container screen" id="pantalla2">
    <h2>Valoro mucho que me hayas presentado tu familia 💛</h2>
    <img src="Familia.jpeg">
    <button onclick="volver()">Volver</button>
  </div>

  <div class="container screen" id="pantalla3">
    <h2>Que jefecita tan linda 💛</h2>
    <img src="La mejor jefecita.jpeg">
    <button onclick="volver()">Volver</button>
  </div>

  <div class="container screen" id="pantalla4">
    <h2>Linda con sus flores 💛</h2>
    <img src="Linda con sus flores.jpeg">
    <button onclick="volver()">Volver</button>
  </div>
<div class="container screen" id="pantalla5">
    <h2>Eres igual de hermosa a un atardecer 💛</h2>
    <img src="Atardecer.jpeg">
    <button onclick="volver()">Volver</button>
  </div>
<div class="container screen" id="pantalla6">
    <h2>No dire nada, pero por si acaso me gustas jajjaja 💛</h2>
    <img src="Cosita linda.jpeg">
    <button onclick="volver()">Volver</button>
  </div>

  <script>
    function mostrar(num) {
      document.getElementById("main").style.display = "none";
      document.getElementById("pantalla" + num).style.display = "flex";
    }

    function volver() {
      document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
      document.getElementById("main").style.display = "block";
    }
  </script>

</body>
</html>
